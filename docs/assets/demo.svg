<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono','Courier New',monospace" font-size="14">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1f25"/>
      <stop offset="100%" stop-color="#15161b"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- terminal frame -->
  <g filter="url(#shadow)">
    <rect x="20" y="20" width="840" height="420" rx="10" fill="url(#bg)"/>
    <rect x="20" y="20" width="840" height="32" rx="10" fill="#2b2d34"/>
    <rect x="20" y="42" width="840" height="10" fill="#2b2d34"/>

    <!-- traffic lights -->
    <circle cx="40" cy="36" r="6" fill="#ff5f57"/>
    <circle cx="60" cy="36" r="6" fill="#febc2e"/>
    <circle cx="80" cy="36" r="6" fill="#28c840"/>

    <text x="440" y="40" fill="#9ca3af" text-anchor="middle" font-size="12">agx — demo</text>
  </g>

  <!-- prompt + command lines -->
  <g fill="#e4e7eb">
    <!-- line 1: add -->
    <text x="40" y="90">
      <tspan fill="#7dd3fc">~ $</tspan>
      <tspan dx="6" fill="#a5d6ff">agx</tspan>
      <tspan dx="6">add work \</tspan>
    </text>
    <text x="40" y="110">
      <tspan dx="40">  --base-url</tspan>
      <tspan dx="6" fill="#f9e29c">https://relay.example/v1</tspan>
      <tspan dx="6">\</tspan>
    </text>
    <text x="40" y="130">
      <tspan dx="40">  --api-key</tspan>
      <tspan dx="6" fill="#c7c5b8">sk-live</tspan>
    </text>
    <text x="40" y="150" fill="#86efac">profile work created</text>

    <!-- line 2: use + run codex -->
    <text x="40" y="190">
      <tspan fill="#7dd3fc">~ $</tspan>
      <tspan dx="6" fill="#a5d6ff">agx</tspan>
      <tspan dx="6">use work</tspan>
    </text>
    <text x="40" y="210" fill="#86efac">current profile: work</text>

    <text x="40" y="245">
      <tspan fill="#7dd3fc">~ $</tspan>
      <tspan dx="6" fill="#a5d6ff">agx</tspan>
      <tspan dx="6">run codex</tspan>
    </text>
    <text x="40" y="265" fill="#9ca3af">› codex launches in isolated context — relay = work</text>

    <!-- separator hint -->
    <line x1="40" y1="285" x2="840" y2="285" stroke="#2b2d34" stroke-dasharray="3 5"/>

    <!-- switch flow -->
    <text x="40" y="315">
      <tspan fill="#7dd3fc">~ $</tspan>
      <tspan dx="6" fill="#a5d6ff">agx</tspan>
      <tspan dx="6">add staging --base-url</tspan>
      <tspan dx="6" fill="#f9e29c">https://relay.example/staging/v1</tspan>
      <tspan dx="6">--api-key</tspan>
      <tspan dx="6" fill="#c7c5b8">sk-stg</tspan>
    </text>
    <text x="40" y="335" fill="#86efac">profile staging created</text>

    <text x="40" y="370">
      <tspan fill="#7dd3fc">~ $</tspan>
      <tspan dx="6" fill="#a5d6ff">agx</tspan>
      <tspan dx="6">use staging</tspan>
      <tspan dx="6" fill="#6b7280">&amp;&amp;</tspan>
      <tspan dx="6" fill="#a5d6ff">agx</tspan>
      <tspan dx="6">run claude</tspan>
    </text>
    <text x="40" y="390" fill="#86efac">current profile: staging</text>
    <text x="40" y="410" fill="#9ca3af">› claude launches in isolated context — relay = staging</text>

    <!-- blinking cursor -->
    <text x="40" y="430">
      <tspan fill="#7dd3fc">~ $</tspan>
      <tspan dx="6" fill="#e4e7eb">
        <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
        █
      </tspan>
    </text>
  </g>
</svg>
