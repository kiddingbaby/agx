# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: agx
dist: dist

builds:
  - id: agx
    main: ./cmd/agx
    binary: agx
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: agx
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ if eq .Arch \"amd64\" }}x86_64{{ else }}{{ .Arch }}{{ end }}"
    files:
      - LICENSE
      - README.md
      - src: docs/man/*.1
        dst: man/man1
        strip_parent: true

brews:
  - name: agx
    ids:
      - agx
    repository:
      owner: kiddingbaby
      name: homebrew-agx
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: kiddingbaby
      email: kiddingbaby@163.com
    commit_msg_template: "agx {{ .Tag }}"
    homepage: https://github.com/kiddingbaby/agx
    description: "Local multi-agent launcher: one relay profile for codex, claude, gemini, opencode."
    license: MIT
    test: |
      assert_match "agx #{version}", shell_output("#{bin}/agx version")
    install: |
      bin.install "agx"
      generate_completions_from_executable(bin/"agx", "completion")
      man1.install Dir["man/man1/*.1"]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: 0.0.0-next

changelog:
  disable: true
