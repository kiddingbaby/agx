core:
  stages: [coding, quality, review, test, uat, scan, pr]
  task_mode: batch
  docs:
    design: .workflow/docs/DESIGN.md
    spec: .workflow/docs/SPEC.md
    todo: .workflow/docs/TODO.md

feature:
  quality:
    run_tidy: true
    run_lint: true
  uat:
    gate: staged
    ready: false
    plan_file: .workflow/docs/UAT.md
    default_persona: guest
    executor: heuristic
    block_levels: [P0, P1]
  issues:
    max_lines: 1000

expert:
  ci:
    timeout_sec: 600
    poll_interval_sec: 10
    merge_strategy: squash
  security:
    trivy_enabled: true
    gitleaks_enabled: true
    semgrep_enabled: true
