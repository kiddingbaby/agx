# spec-workflow 配置文件
# 复制到项目根目录为 .spec-workflow.conf 或 ~/.spec-workflow.conf

# ============ 安全扫描 ============
# 远程扫描主机（空=本地执行）
SECURITY_SCAN_HOST=""
# 远程用户
SECURITY_SCAN_USER="root"
# 启用 trivy 依赖扫描
TRIVY_ENABLED=true
# 启用 gitleaks 敏感信息检测
GITLEAKS_ENABLED=true
# trivy 参数
TRIVY_ARGS="fs . --severity HIGH,CRITICAL"
# gitleaks 参数
GITLEAKS_ARGS="detect --no-git"

# ============ 审查配置 ============
# /pr-submit 自动触发审查链
AUTO_REVIEW_ON_PR=true
# 审查顺序（逗号分隔）
REVIEW_CHAIN="code-review,test-qa,security-check"

# ============ 分支配置 ============
# 受保护分支（逗号分隔）
PROTECTED_BRANCHES="main,master"
# 允许的分支前缀（逗号分隔）
BRANCH_PREFIX="feat,fix,refactor,docs,chore"

# ============ Spec 配置 ============
# Spec 文件名
SPEC_FILE="SPEC.md"
# 要求 spec 的文件扩展名（逗号分隔）
SPEC_REQUIRED_EXTENSIONS="ts,tsx,js,jsx,py,go,rs,sh"
